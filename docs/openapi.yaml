openapi: 3.0.3
info:
  title: Rusting Frog API
  description: |
    Screaming-Frog-compatible SEO crawler backend, in Rust.

    **Auth.** Every endpoint requires a Laravel-issued JWT in `Authorization: Bearer <jwt>`.
    Dev: mint one with `node scripts/mint_jwt.js` (60-minute TTL; claims
    `tenant_id`, `user_id`, `scopes`).

    **Tenancy.** `tenant_id` is taken from the JWT `tenant_id` claim; callers never
    pass it. All reads and writes are scoped to the caller's tenant.

    **Implementation progress.** Batches 1–3 of the evaluator roll-out are wired:
      - *Batch 1 — response/title/meta/H1/H2* (19 filter keys): `response_code_*`,
        `internal_*`, `external_*`, `title_*`, `meta_descripton_*`,
        `meta_keywords_*`, `h1_*`, `h2_*`.
      - *Batch 2 — images / links / external* (32 filter keys): `images_*`,
        `links_*`, full `external_*` split by content-type.
      - *Batch 3 — canonicals / pagination / directives* (34 filter keys):
        `canonicals_*` (self-ref, canonicalised, missing, multiple,
        conflicting, relative, fragment, invalid, outside-head),
        `pagination_*` (contains, first-page, paginated-2-plus,
        not-in-anchor, multiple), `directives_*` (every robots token —
        index/noindex/follow/nofollow/none/noarchive/nosnippet/
        max-snippet/max-image-preview/max-video-preview/noodp/noydir/
        noimageindex/notranslate/unavailable-after/refresh/outside-head).

    A handful of cross-URL filters (e.g. `canonicals_unlinked`,
    `pagination_pagination_loop`, `canonicals_non_indexable_canonical`)
    are intentionally deferred to the post-crawl analysis pass — they
    need the complete URL graph to evaluate safely.

    Filter keys that aren't yet implemented will return 0 counts in
    `/overview` and an empty `data` array when used as a grid filter —
    they're valid catalog entries, just not evaluated yet.

    **Sample responses** in this spec were captured against
    `https://boltrack.in/` (see `api-responses/boltrack/` in the repo).

    **This spec is hand-written** — a Swagger UI app in `../swagger-ui/` loads it
    and issues requests against the Rust server at `http://localhost:3000`.
  version: "0.3.0"
  contact:
    name: sf-clone-rust
    url: https://github.com/sahiljani/Rusting-Frog

servers:
  - url: http://localhost:3000
    description: Local dev server

tags:
  - name: catalog
    description: Static tab/filter registry. Cacheable.
  - name: projects
    description: A "crawl site" — name + seed URL + persisted config.
  - name: crawls
    description: Crawl lifecycle (start, pause, resume, stop, status).
  - name: urls
    description: Per-URL results grid and detail tabs.
  - name: overview
    description: Aggregate findings across a whole crawl.

security:
  - bearerAuth: []

paths:
  /v1/catalog/tabs:
    get:
      tags: [catalog]
      summary: List every tab and its filters
      description: |
        Returns all 33 SF tabs, each with its filter keys, display names,
        severities, and filter types. Used by the frontend to render tabs
        and filter dropdowns. Safe to cache for an hour.
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TabCatalog" }
              examples:
                sample:
                  value:
                    - key: page_titles
                      display_name: Page Titles
                      i18n_key: page_titles
                      has_dynamic_filters: false
                      filters:
                        - key: title_missing
                          display_name: Missing
                          severity: Issue
                          filter_type: Issue
                          has_watermark: false

  /v1/projects:
    get:
      tags: [projects]
      summary: List projects for the caller's tenant
      description: |
        Returns all projects for the tenant in the JWT. Results are not
        paginated yet — a tenant is expected to have tens, not thousands,
        of projects. Sorted by `created_at` descending.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Project" }
              examples:
                boltrack:
                  summary: Tenant with 2 projects (fixture + boltrack)
                  value:
                    - id: 019d99c6-5f95-7c72-b9a0-de12892deeb5
                      name: boltrack
                      seed_url: https://boltrack.in/
                      created_at: 2026-04-17T04:50:07.893885Z
                      updated_at: 2026-04-17T04:50:07.893885Z
                    - id: 019d97c1-0000-7000-8000-000000000001
                      name: fixture
                      seed_url: http://127.0.0.1:8181/
                      created_at: 2026-04-16T19:49:00Z
                      updated_at: 2026-04-16T19:49:00Z
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [projects]
      summary: Create a project
      description: |
        Registers a new site for crawling. `seed_url` must be an absolute
        `http(s)` URL. The seed's scheme + host is what the crawler uses
        to classify URLs as internal vs. external. Project creation does
        NOT start a crawl — call `POST /v1/projects/{id}/crawls` next.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProjectRequest" }
            examples:
              example:
                value:
                  name: Boltrack
                  seed_url: https://boltrack.in/
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
              examples:
                boltrack:
                  value:
                    id: 019d99c6-5f95-7c72-b9a0-de12892deeb5
                    name: boltrack
                    seed_url: https://boltrack.in/
                    created_at: 2026-04-17T04:50:07.893885Z
                    updated_at: 2026-04-17T04:50:07.893885Z
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/projects/{id}:
    parameters:
      - { $ref: "#/components/parameters/ProjectId" }
    get:
      tags: [projects]
      summary: Get a project by id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [projects]
      summary: Delete a project and cascade its crawls
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
                required: [deleted]
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/projects/{project_id}/crawls:
    parameters:
      - in: path
        name: project_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [crawls]
      summary: List crawls for a project
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CrawlSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [crawls]
      summary: Start a crawl (async — returns immediately with status=queued)
      description: |
        Enqueues a crawl for this project. The HTTP response returns
        immediately with the new `crawl_id`; actual fetching runs in the
        `sf-crawl-worker` binary. Poll `GET /v1/crawls/{id}` for progress,
        or subscribe to the future WebSocket stream at `/v1/crawls/{id}/live`.

        The crawl honours the project's config snapshot at start time
        (max depth, respect-robots, render flag, etc.). Each URL is
        fetched, parsed, and evaluated through all implemented evaluator
        tabs (Batch 1 + 2 at present). Findings land in `crawl_url_findings`.
      responses:
        "200":
          description: Crawl queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CrawlStartResponse" }
              examples:
                boltrack:
                  value:
                    id: 019d99c6-80f0-7251-a548-756acad321d4
                    status: queued
                    message: crawl queued
        "404":
          description: Project not found
          $ref: "#/components/responses/NotFound"

  /v1/crawls/{id}:
    parameters:
      - { $ref: "#/components/parameters/CrawlId" }
    get:
      tags: [crawls]
      summary: Get crawl status + counters
      description: |
        Returns crawl metadata and lifecycle state. Use this to poll a
        running crawl — `urls_discovered` grows as the frontier expands
        and `urls_crawled` grows as fetches complete. When `status =
        "completed"`, `completed_at` is set and no more URLs will be added.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CrawlDetail" }
              examples:
                boltrack_complete:
                  summary: Completed boltrack.in crawl (210 URLs, ~110s)
                  value:
                    id: 019d99c6-80f0-7251-a548-756acad321d4
                    project_id: 019d99c6-5f95-7c72-b9a0-de12892deeb5
                    status: completed
                    urls_discovered: 213
                    urls_crawled: 210
                    seed_urls: ["https://boltrack.in/"]
                    created_at: 2026-04-17T04:50:16.432606Z
                    started_at: 2026-04-17T04:50:17.751117Z
                    completed_at: 2026-04-17T04:52:06.991479Z
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/crawls/{id}/pause:
    parameters:
      - { $ref: "#/components/parameters/CrawlId" }
    post:
      tags: [crawls]
      summary: Pause a running crawl (idempotent)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CrawlStartResponse" }

  /v1/crawls/{id}/resume:
    parameters:
      - { $ref: "#/components/parameters/CrawlId" }
    post:
      tags: [crawls]
      summary: Resume a paused crawl
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CrawlStartResponse" }

  /v1/crawls/{id}/stop:
    parameters:
      - { $ref: "#/components/parameters/CrawlId" }
    post:
      tags: [crawls]
      summary: Stop a crawl and finalize
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CrawlStartResponse" }

  /v1/crawls/{crawl_id}/urls:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
      - in: query
        name: tab
        schema: { type: string }
        description: Tab key (unused when `filter` is provided — filter is authoritative)
      - in: query
        name: filter
        schema: { type: string }
        description: |
          Filter key to grid by, e.g. `meta_descripton_missing`, `h1_multiple`,
          `title_over_x_characters`. Returns only URLs whose findings include this key.
      - in: query
        name: q
        schema: { type: string }
        description: Free-text substring search across URL (not yet implemented)
      - in: query
        name: cursor
        schema: { type: string }
        description: Opaque pagination cursor (not yet implemented)
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    get:
      tags: [urls]
      summary: The main results grid — list URLs, optionally filtered by finding
      description: |
        The hot path. Returns a page of URL rows, suitable for rendering
        the SF-style tabular grid. Pass `filter=<filter_key>` to narrow
        to only URLs whose findings include that key — e.g.
        `filter=images_missing_alt_text` returns every URL that had at
        least one `<img>` missing usable alt text.

        **Implemented filter keys (Batches 1 + 2):** see the
        `/v1/catalog/tabs` catalog. Any filter key is accepted, but
        un-implemented keys will return an empty `data` array.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UrlGridResponse" }
              examples:
                boltrack_unfiltered:
                  summary: First page of boltrack.in URLs (no filter)
                  value:
                    data:
                      - id: 019d99c6-88f0-7253-b6fc-92ad510fe576
                        url: https://boltrack.in/
                        status_code: 200
                        content_type: html
                        is_internal: true
                        depth: 0
                        title: Suspended Platform Rental Ahmedabad - Boltrack Engineers
                        title_length: 56
                        h1_first: WORK AT ANYHEIGHT WITHCONFIDENCE
                        h1_count: 1
                        word_count: 1681
                        response_time_ms: 707
                        content_length: 0
                        crawled_at: 2026-04-17T04:50:18.480459Z
                    next_cursor: null
                images_missing_alt:
                  summary: filter=images_missing_alt_text
                  value:
                    data:
                      - id: 019d99c6-88f0-7253-b6fc-92ad510fe576
                        url: https://boltrack.in/
                        status_code: 200
                        content_type: html
                        is_internal: true
                        depth: 0
                        title: Suspended Platform Rental Ahmedabad - Boltrack Engineers
                        h1_count: 1
                    next_cursor: null

  /v1/crawls/{crawl_id}/urls/{url_id}:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
      - { $ref: "#/components/parameters/UrlId" }
    get:
      tags: [urls]
      summary: URL detail (summary + every finding on this URL)
      description: |
        Returns every captured field for a single URL — title length,
        meta description, H1/H2, canonical, robots meta, plus the full
        list of filter keys that fired during evaluation (`findings`).
        Feeds SF's "URL Details" right-pane tab.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UrlDetail" }
              examples:
                boltrack_home:
                  summary: boltrack.in home page
                  value:
                    id: 019d99c6-88f0-7253-b6fc-92ad510fe576
                    url: https://boltrack.in/
                    status_code: 200
                    content_type: html
                    is_internal: true
                    depth: 0
                    title: Suspended Platform Rental Ahmedabad - Boltrack Engineers
                    title_length: 56
                    meta_description: Boltrack Engineers designs, manufactures, and rents precision-engineered suspended platforms and construction equipment.
                    meta_description_length: 167
                    h1_first: WORK AT ANYHEIGHT WITHCONFIDENCE
                    h1_count: 1
                    h2_first: "PRODUCT\t\t\t         RANGE"
                    h2_count: 8
                    canonical_url: https://boltrack.in/
                    meta_robots: "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
                    word_count: 1681
                    response_time_ms: 707
                    crawled_at: 2026-04-17T04:50:18.480459Z
                    findings:
                      - response_code_success
                      - title_all
                      - meta_descripton_over_x_characters
                      - h1_all
                      - images_background_images
                      - meta_descripton_multiple
                      - h2_multiple
                      - links_all
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/crawls/{crawl_id}/urls/{url_id}/inlinks:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
      - { $ref: "#/components/parameters/UrlId" }
    get:
      tags: [urls]
      summary: Inlinks — every URL that links to this one
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Inlink" }

  /v1/crawls/{crawl_id}/urls/{url_id}/outlinks:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
      - { $ref: "#/components/parameters/UrlId" }
    get:
      tags: [urls]
      summary: Outlinks — every URL this one links to
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Outlink" }

  /v1/crawls/{crawl_id}/overview:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
    get:
      tags: [overview]
      summary: Count-by-filter rollup across the whole crawl
      description: |
        Returns `{filter_key: count}` — how many URLs in this crawl
        matched each filter. Feeds the SF-style left-rail overview tree.
        Only filter keys that fired at least once appear in the map, so
        absent keys are implicitly zero.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                additionalProperties: { type: integer }
              examples:
                fixture_batch3:
                  summary: local fixture site with Batch 3 pages (146 URLs)
                  value:
                    canonicals_all: 146
                    canonicals_missing: 141
                    canonicals_contains_canonical: 5
                    canonicals_canonicalised: 3
                    canonicals_self_referencing: 1
                    canonicals_multiple: 1
                    canonicals_multiple_conflicting: 1
                    canonicals_canonical_is_relative: 1
                    canonicals_invalid_attributes: 1
                    canonicals_contains_fragment_url: 1
                    canonicals_outside_head: 1
                    pagination_all: 146
                    pagination_contains_pagination: 3
                    pagination_first_page: 2
                    pagination_paginated_2_plus: 1
                    pagination_pagination_not_in_anchor: 1
                    pagination_multiple_pagination_urls: 1
                    directives_all: 146
                    directives_index: 1
                    directives_noindex: 2
                    directives_follow: 1
                    directives_nofollow: 1
                    directives_none: 1
                    directives_noarchive: 1
                    directives_nosnippet: 1
                    directives_max_snippet: 1
                    directives_max_image_preview: 1
                    directives_max_video_preview: 1
                    directives_noodp: 1
                    directives_noimageindex: 1
                    directives_notranslate: 1
                    directives_unavailable_after: 1
                    directives_refresh: 1
                    directives_outside_head: 1
                boltrack:
                  summary: boltrack.in (210 URLs, implemented filters only)
                  value:
                    internal_all: 201
                    internal_html: 106
                    internal_images: 82
                    internal_css: 6
                    internal_javascript: 7
                    external_all: 9
                    external_html: 5
                    external_images: 3
                    external_javascript: 1
                    response_code_all: 210
                    response_code_success: 159
                    response_code_internal_success: 151
                    response_code_internal_client_error: 50
                    title_all: 111
                    title_below_x_characters: 55
                    title_over_x_characters: 10
                    meta_descripton_missing: 51
                    meta_descripton_below_x_characters: 2
                    meta_descripton_over_x_characters: 13
                    meta_descripton_multiple: 22
                    meta_keywords_all: 111
                    meta_keywords_missing: 111
                    h1_all: 111
                    h1_missing: 2
                    h1_non_sequential: 47
                    h2_all: 111
                    h2_missing: 2
                    h2_multiple: 56
                    h2_non_sequential: 47
                    links_all: 111
                    links_no_internal_outlinks: 51
                    links_no_anchor_text_outlinks: 4
                    links_high_internal_outlinks: 3
                    links_high_external_outlinks: 4
                    images_all: 85
                    images_missing_alt_text: 5
                    images_missing_size_attributes: 52
                    images_background_images: 58

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived JWT issued by Laravel; `tenant_id`, `user_id`, `scopes` claims required.

  parameters:
    ProjectId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    CrawlId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    CrawlIdAsCrawl:
      in: path
      name: crawl_id
      required: true
      schema: { type: string, format: uuid }
    UrlId:
      in: path
      name: url_id
      required: true
      schema: { type: string, format: uuid }

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    NotFound:
      description: Resource not found in this tenant
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ValidationError:
      description: Request body failed validation
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Problem:
      type: object
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
      required: [title, status]

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        seed_url: { type: string, format: uri }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, name, seed_url, created_at, updated_at]

    CreateProjectRequest:
      type: object
      properties:
        name: { type: string, example: "My Site" }
        seed_url: { type: string, format: uri, example: "https://example.com/" }
      required: [name, seed_url]

    CrawlSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [queued, running, paused, completed, failed] }
        urls_discovered: { type: integer }
        urls_crawled: { type: integer }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
      required: [id, status, urls_discovered, urls_crawled, created_at]

    CrawlDetail:
      allOf:
        - $ref: "#/components/schemas/CrawlSummary"
        - type: object
          properties:
            project_id: { type: string, format: uuid }
            seed_urls:
              type: array
              items: { type: string, format: uri }

    CrawlStartResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string }
        message: { type: string }
      required: [id, status, message]

    TabCatalog:
      type: object
      properties:
        key: { type: string }
        display_name: { type: string }
        i18n_key: { type: string }
        has_dynamic_filters: { type: boolean }
        filters:
          type: array
          items: { $ref: "#/components/schemas/FilterCatalog" }
      required: [key, display_name, filters]

    FilterCatalog:
      type: object
      properties:
        key: { type: string, example: h1_missing }
        display_name: { type: string, example: Missing }
        severity:
          type: string
          enum: [Issue, PotentialIssue, Opportunity, Normal]
        filter_type:
          type: string
          enum: [Normal, Issue, PotentialIssue, Opportunity, Highlight, NotSet, PostCrawlAnalysis]
        has_watermark: { type: boolean }
      required: [key, display_name]

    UrlGridResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/UrlRow" }
        next_cursor:
          type: string
          nullable: true
      required: [data]

    UrlRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        url: { type: string, format: uri }
        status_code: { type: integer, nullable: true }
        content_type: { type: string }
        is_internal: { type: boolean }
        depth: { type: integer }
        title: { type: string, nullable: true }
        title_length: { type: integer, nullable: true }
        h1_first: { type: string, nullable: true }
        h1_count: { type: integer }
        word_count: { type: integer, nullable: true }
        response_time_ms: { type: integer, nullable: true }
        content_length: { type: integer, nullable: true }
        crawled_at: { type: string, format: date-time, nullable: true }
      required: [id, url]

    UrlDetail:
      allOf:
        - $ref: "#/components/schemas/UrlRow"
        - type: object
          properties:
            title_pixel_width: { type: integer, nullable: true }
            meta_description: { type: string, nullable: true }
            meta_description_length: { type: integer, nullable: true }
            h2_first: { type: string, nullable: true }
            h2_count: { type: integer }
            redirect_url: { type: string, nullable: true }
            canonical_url: { type: string, nullable: true }
            meta_robots: { type: string, nullable: true }
            findings:
              type: array
              items: { type: string }
              description: Filter keys that fired on this URL.

    Inlink:
      type: object
      properties:
        source_url_id: { type: string, format: uuid }
