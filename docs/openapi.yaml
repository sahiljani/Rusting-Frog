openapi: 3.0.3
info:
  title: Rusting Frog API
  description: |
    Screaming-Frog-compatible SEO crawler backend, in Rust.

    **Auth.** Every endpoint requires a Laravel-issued JWT in `Authorization: Bearer <jwt>`.
    Dev: mint one with `node scripts/mint_jwt.js` (60-minute TTL; claims
    `tenant_id`, `user_id`, `scopes`).

    **Tenancy.** `tenant_id` is taken from the JWT `tenant_id` claim; callers never
    pass it. All reads and writes are scoped to the caller's tenant.

    **Implementation progress.** Batches 1–9 of the evaluator roll-out are wired:
      - *Batch 1 — response/title/meta/H1/H2* (19 filter keys): `response_code_*`,
        `internal_*`, `external_*`, `title_*`, `meta_descripton_*`,
        `meta_keywords_*`, `h1_*`, `h2_*`.
      - *Batch 2 — images / links / external* (32 filter keys): `images_*`,
        `links_*`, full `external_*` split by content-type.
      - *Batch 3 — canonicals / pagination / directives* (34 filter keys):
        `canonicals_*` (self-ref, canonicalised, missing, multiple,
        conflicting, relative, fragment, invalid, outside-head),
        `pagination_*` (contains, first-page, paginated-2-plus,
        not-in-anchor, multiple), `directives_*` (every robots token —
        index/noindex/follow/nofollow/none/noarchive/nosnippet/
        max-snippet/max-image-preview/max-video-preview/noodp/noydir/
        noimageindex/notranslate/unavailable-after/refresh/outside-head).
      - *Batch 4 — hreflang / URL / content* (23 filter keys):
        `hreflang_*` (contains, missing, missing-xdefault,
        missing-self-reference, multiple-entries, incorrect-language-codes,
        outside-head, not-using-canonical), `url_*` (underscores, uppercase,
        parameters, over-x-characters, multiple-slashes, repetitive-path,
        contains-space, non-ascii-characters, internal-search-url,
        ga-tracking-parameters), `content_*` (low-content-pages,
        lorem-ipsum-placeholder, readability-difficult + very-difficult
        via Flesch–Kincaid).
      - *Batch 5 — security / validation / mobile* (12 filter keys):
        `security_*` (http, https, mixed-content, form-on-http-page,
        form-url-insecure, unsafe-cross-origin `target=_blank` without
        `rel=noopener`, protocol-relative-urls), `validation_*`
        (invalid-elements-in-head detected from raw HTML since html5ever
        relocates illegal tags; document-over-15mb via response
        Content-Length), `mobile_*` (viewport-not-set,
        mobile-alternate-link). Header-dependent security filters
        (HSTS/CSP/X-Frame/Referrer-Policy/Content-Type/BadMimeType)
        deferred until response headers are persisted on `CrawlUrl`;
        mobile layout filters (target-size, font-size, content sizing)
        deferred to the render worker.
      - *Batch 9 — integration-blocked tabs* (7 tabs, 0 live
        filter keys). Registers stub evaluators for the tabs whose
        findings only exist once an external data source is
        connected: `analytics` (GA4 API),
        `search_console` (GSC API), `link_metrics` (Moz /
        Majestic / Ahrefs), `ai` (per-tenant AI provider),
        `custom_search` / `custom_extraction` /
        `custom_java_script` (user-authored slots 1..100). The
        stubs emit no findings, which keeps the `/overview`
        rollup honest — these tabs show 0 until the integration
        lands — while still exposing the full 33-tab catalog to
        clients and reserving the evaluator trait slot for the
        real implementation.
      - *Batch 8 — accessibility* (13 static-HTML rule filters plus
        the candidate bucket). Runs the DOM-only subset of the axe-core
        rule set that doesn't need computed styles or layout:
        `accessibility_all`, `accessibility_rule_html_has_lang`,
        `accessibility_rule_html_lang_valid` (BCP-47-shaped check),
        `accessibility_rule_document_title` (missing or empty),
        `accessibility_rule_page_has_heading_one`,
        `accessibility_rule_meta_refresh`,
        `accessibility_rule_image_alt` (missing `alt` attribute —
        empty alt is treated as intentional/decorative and not
        flagged),
        `accessibility_rule_frame_title` (iframe missing non-empty
        `title`), `accessibility_rule_button_name` /
        `accessibility_rule_link_name` (no accessible name via
        text, `aria-label`, `aria-labelledby`, `title`, or
        descendant `<img alt>`), `accessibility_rule_input_image_alt`,
        `accessibility_rule_blink`, `accessibility_rule_marquee`.
        The remaining ~90 axe rule filters and the three score
        buckets (poor / needs-improvement / good) need
        color-contrast calculation, layout-aware target-size /
        landmark / region checks, or full ARIA state resolution —
        all of which require the headless-Chromium render worker
        to run `axe.run()` against the rendered page. Those stay
        deferred to the render-worker integration.
      - *Batch 7 — structured-data / PageSpeed / Parity* (9 real
        filter keys + 2 candidate-bucket stubs): `structured_data_*`
        (all, contains-structured-data, missing-structured-data,
        jsonld-urls for any `<script type="application/ld+json">`,
        microdata-urls for any `itemscope` element, rdfa-urls for
        any `typeof` / `property` element, parse-errors when
        JSON-LD body fails `serde_json::from_str`),
        `pagespeed_all` + `parity_all` (candidate bucket only —
        per-audit PageSpeed filters depend on the PSI third-party
        integration, per-field Parity filters depend on the render
        worker diffing raw-HTML vs rendered-DOM snapshots, both
        deferred to later batches). Schema-level structured-data
        validation (validation-errors/warnings, Google
        validation-errors/warnings, feature-detected) is deferred —
        it needs a schema.org registry lookup plus the Google Rich
        Results classifier.
      - *Batch 6 — sitemaps / AMP / JavaScript* (14 filter keys):
        `sitemaps_all` (every HTML page flagged until XML sitemap
        fetching lands; cross-URL sitemap filters — orphan, non-indexable,
        missing-from-sitemap — deferred to post-crawl analysis),
        `amp_*` (all, indexable, contains-disallowed-html covering
        `<iframe>`/`<object>`/`<embed>`/non-AMP `<script>`,
        missing-doctype, missing-head/body, missing-canonical,
        missing-charset, missing-viewport, missing-amp-script,
        missing-amp-boilerplate; AMP detected via `<html amp>` or
        `<html ⚡>` U+26A1 attribute), `javascript_*` (all,
        contains-js-content for any `<script>` element,
        old-ajax-crawling-scheme for `#!` URLs or
        `_escaped_fragment_=` query, old-ajax-crawling-meta-fragment-tag
        for `<meta name="fragment" content="!">`). AMP validation beyond
        structural markers (amp-layout, amp-boilerplate CSS checks) and
        JavaScript-specific filters requiring the render-worker
        (js-rendered-content, blocked-resource) are deferred.

    A handful of cross-URL filters (e.g. `canonicals_unlinked`,
    `pagination_pagination_loop`, `canonicals_non_indexable_canonical`,
    `hreflang_missing_return_links`, `hreflang_non_200_hreflang_urls`,
    `content_duplicates`, `content_near_duplicates`) are intentionally
    deferred to the post-crawl analysis pass — they need the complete
    URL graph or a MinHash index built over all pages.

    Filter keys that aren't yet implemented will return 0 counts in
    `/overview` and an empty `data` array when used as a grid filter —
    they're valid catalog entries, just not evaluated yet.

    **Sample responses** in this spec were captured against
    `https://boltrack.in/` (see `api-responses/boltrack/` in the repo).

    **This spec is hand-written** — a Swagger UI app in `../swagger-ui/` loads it
    and issues requests against the Rust server at `http://localhost:3000`.
  version: "0.15.0"
  contact:
    name: sf-clone-rust
    url: https://github.com/sahiljani/Rusting-Frog

servers:
  - url: http://localhost:3000
    description: Local dev server

tags:
  - name: catalog
    description: Static tab/filter registry. Cacheable.
  - name: projects
    description: A "crawl site" — name + seed URL + persisted config.
  - name: crawls
    description: Crawl lifecycle (start, pause, resume, stop, status).
  - name: urls
    description: Per-URL results grid and detail tabs.
  - name: overview
    description: Aggregate findings across a whole crawl.

security:
  - bearerAuth: []

paths:
  /v1/catalog/tabs:
    get:
      tags: [catalog]
      summary: List every tab and its filters
      description: |
        Returns all 33 SF tabs, each with its filter keys, display names,
        severities, and filter types. Used by the frontend to render tabs
        and filter dropdowns. Safe to cache for an hour.
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/TabCatalog" }
              examples:
                sample:
                  value:
                    - key: page_titles
                      display_name: Page Titles
                      i18n_key: page_titles
                      has_dynamic_filters: false
                      filters:
                        - key: title_missing
                          display_name: Missing
                          severity: Issue
                          filter_type: Issue
                          has_watermark: false

  /v1/projects:
    get:
      tags: [projects]
      summary: List projects for the caller's tenant
      description: |
        Returns all projects for the tenant in the JWT. Results are not
        paginated yet — a tenant is expected to have tens, not thousands,
        of projects. Sorted by `created_at` descending.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Project" }
              examples:
                boltrack:
                  summary: Tenant with 2 projects (fixture + boltrack)
                  value:
                    - id: 019d99c6-5f95-7c72-b9a0-de12892deeb5
                      name: boltrack
                      seed_url: https://boltrack.in/
                      created_at: 2026-04-17T04:50:07.893885Z
                      updated_at: 2026-04-17T04:50:07.893885Z
                    - id: 019d97c1-0000-7000-8000-000000000001
                      name: fixture
                      seed_url: http://127.0.0.1:8181/
                      created_at: 2026-04-16T19:49:00Z
                      updated_at: 2026-04-16T19:49:00Z
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [projects]
      summary: Create a project
      description: |
        Registers a new site for crawling. `seed_url` must be an absolute
        `http(s)` URL. The seed's scheme + host is what the crawler uses
        to classify URLs as internal vs. external. Project creation does
        NOT start a crawl — call `POST /v1/projects/{id}/crawls` next.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProjectRequest" }
            examples:
              example:
                value:
                  name: Boltrack
                  seed_url: https://boltrack.in/
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
              examples:
                boltrack:
                  value:
                    id: 019d99c6-5f95-7c72-b9a0-de12892deeb5
                    name: boltrack
                    seed_url: https://boltrack.in/
                    created_at: 2026-04-17T04:50:07.893885Z
                    updated_at: 2026-04-17T04:50:07.893885Z
        "400": { $ref: "#/components/responses/ValidationError" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /v1/projects/{id}:
    parameters:
      - { $ref: "#/components/parameters/ProjectId" }
    get:
      tags: [projects]
      summary: Get a project by id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Project" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [projects]
      summary: Delete a project and cascade its crawls
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted: { type: boolean }
                required: [deleted]
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/projects/{project_id}/crawls:
    parameters:
      - in: path
        name: project_id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [crawls]
      summary: List crawls for a project
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/CrawlSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      tags: [crawls]
      summary: Start a crawl (async — returns immediately with status=queued)
      description: |
        Enqueues a crawl for this project. The HTTP response returns
        immediately with the new `crawl_id`; actual fetching runs in the
        `sf-crawl-worker` binary. Poll `GET /v1/crawls/{id}` for progress,
        or subscribe to the future WebSocket stream at `/v1/crawls/{id}/live`.

        The crawl honours the project's config snapshot at start time
        (max depth, respect-robots, render flag, etc.). Each URL is
        fetched, parsed, and evaluated through all implemented evaluator
        tabs (Batch 1 + 2 at present). Findings land in `crawl_url_findings`.
      responses:
        "200":
          description: Crawl queued
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CrawlStartResponse" }
              examples:
                boltrack:
                  value:
                    id: 019d99c6-80f0-7251-a548-756acad321d4
                    status: queued
                    message: crawl queued
        "404":
          description: Project not found
          $ref: "#/components/responses/NotFound"

  /v1/crawls/{id}:
    parameters:
      - { $ref: "#/components/parameters/CrawlId" }
    get:
      tags: [crawls]
      summary: Get crawl status + counters
      description: |
        Returns crawl metadata and lifecycle state. Use this to poll a
        running crawl — `urls_discovered` grows as the frontier expands
        and `urls_crawled` grows as fetches complete. When `status =
        "completed"`, `completed_at` is set and no more URLs will be added.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CrawlDetail" }
              examples:
                boltrack_complete:
                  summary: Completed boltrack.in crawl (210 URLs, ~110s)
                  value:
                    id: 019d99c6-80f0-7251-a548-756acad321d4
                    project_id: 019d99c6-5f95-7c72-b9a0-de12892deeb5
                    status: completed
                    urls_discovered: 213
                    urls_crawled: 210
                    seed_urls: ["https://boltrack.in/"]
                    created_at: 2026-04-17T04:50:16.432606Z
                    started_at: 2026-04-17T04:50:17.751117Z
                    completed_at: 2026-04-17T04:52:06.991479Z
        "404": { $ref: "#/components/responses/NotFound" }

  /v1/crawls/{id}/pause:
    parameters:
      - { $ref: "#/components/parameters/CrawlId" }
    post:
      tags: [crawls]
      summary: Pause a running crawl (idempotent)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CrawlStartResponse" }

  /v1/crawls/{id}/resume:
    parameters:
      - { $ref: "#/components/parameters/CrawlId" }
    post:
      tags: [crawls]
      summary: Resume a paused crawl
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CrawlStartResponse" }

  /v1/crawls/{id}/stop:
    parameters:
      - { $ref: "#/components/parameters/CrawlId" }
    post:
      tags: [crawls]
      summary: Stop a crawl and finalize
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CrawlStartResponse" }

  /v1/crawls/{id}/robots:
    parameters:
      - { $ref: "#/components/parameters/CrawlId" }
    get:
      tags: [crawls]
      summary: Get the robots.txt body + parsed groups used for this crawl
      description: |
        Returns the literal `robots.txt` body fetched at crawl start, the
        HTTP status of that fetch, a best-effort structural parse (grouped
        user-agent → disallow/allow/sitemap) and the running count of URLs
        that were discovered but blocked by a `Disallow` directive.

        Status semantics:
          - `200` — site served a robots file; `raw` is populated and was
            used to gate every fetch.
          - `404` — site has no robots file; `raw` is `null` and every URL
            was allowed (matches Screaming Frog's default).
          - `null` — robots fetch errored (DNS / timeout / TLS); `raw` is
            `null` and the crawler fetched everything.

        `blocked_url_count` drives SF's "Response Codes → Blocked by
        Robots.txt" filter.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url, status, raw, groups, blocked_url_count]
                properties:
                  url:
                    type: string
                    format: uri
                    nullable: true
                    description: The URL the robots.txt was fetched from.
                  status:
                    type: integer
                    nullable: true
                    description: HTTP status of the robots fetch. `null` means the fetch errored.
                  raw:
                    type: string
                    nullable: true
                    description: Literal robots.txt body. `null` when the fetch was non-2xx or errored.
                  groups:
                    type: array
                    description: One entry per `User-agent:` block, parsed out of `raw`.
                    items:
                      type: object
                      required: [user_agents, disallow, allow, sitemap]
                      properties:
                        user_agents: { type: array, items: { type: string } }
                        disallow:    { type: array, items: { type: string } }
                        allow:       { type: array, items: { type: string } }
                        sitemap:     { type: array, items: { type: string } }
                  blocked_url_count:
                    type: integer
                    description: Number of URLs in this crawl that were discovered but blocked by a matching `Disallow` directive.
              example:
                url: "https://github.com/robots.txt"
                status: 200
                raw: "User-agent: *\nDisallow: /*/pulse\nDisallow: /*/forks\nSitemap: https://github.com/sitemap.xml\n"
                groups:
                  - user_agents: ["*"]
                    disallow: ["/*/pulse", "/*/forks"]
                    allow: []
                    sitemap: ["https://github.com/sitemap.xml"]
                blocked_url_count: 2

  /v1/crawls/{id}/sitemap:
    parameters:
      - { $ref: "#/components/parameters/CrawlId" }
    get:
      tags: [crawls]
      summary: Get the sitemap.xml body + URL set used for this crawl
      description: |
        Returns the sitemap.xml body fetched at crawl start (or each of the
        child sitemap bodies if the root was a `<sitemapindex>`), the HTTP
        status of that fetch, and the parsed URL set with coverage stats.

        Coverage semantics:
          - `url_count` — total unique `<loc>` URLs extracted.
          - `crawled_count` — how many of those were actually visited by
            the crawler.
          - `orphan_count` = `url_count − crawled_count`; drives the SF
            "Orphan URLs" filter (URLs in sitemap but never discovered).

        The `urls` array is paginated via `?limit=N` (default 100, max
        1000); the totals always reflect the full set.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 1000, default: 100 }
          description: Max URLs to return in the `urls` array.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url, status, raw, url_count, crawled_count, orphan_count, urls, urls_returned]
                properties:
                  url:
                    type: string
                    format: uri
                    nullable: true
                    description: The URL the sitemap.xml was fetched from.
                  status:
                    type: integer
                    nullable: true
                    description: HTTP status of the sitemap fetch. `null` means the fetch errored.
                  raw:
                    type: string
                    nullable: true
                    description: Literal sitemap body (the root document only; child sitemap bodies are not stored).
                  url_count:
                    type: integer
                    description: Total unique URLs extracted from the sitemap(s).
                  crawled_count:
                    type: integer
                    description: Count of sitemap URLs also present in the crawl.
                  orphan_count:
                    type: integer
                    description: Count of sitemap URLs NOT visited by the crawler.
                  urls_returned:
                    type: integer
                    description: Size of the `urls` array in this response (honours `?limit=`).
                  urls:
                    type: array
                    items: { type: string, format: uri }
              example:
                url: "https://www.cloudflare.com/sitemap.xml"
                status: 200
                raw: "<?xml version=\"1.0\" encoding=\"UTF-8\"?><urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">…</urlset>"
                url_count: 1820
                crawled_count: 1
                orphan_count: 1819
                urls_returned: 100
                urls:
                  - "https://www.cloudflare.com/"
                  - "https://www.cloudflare.com/about-overview/"

  /v1/crawls/{crawl_id}/urls:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
      - in: query
        name: tab
        schema: { type: string }
        description: Tab key (unused when `filter` is provided — filter is authoritative)
      - in: query
        name: filter
        schema: { type: string }
        description: |
          Filter key to grid by, e.g. `meta_descripton_missing`, `h1_multiple`,
          `title_over_x_characters`. Returns only URLs whose findings include this key.
      - in: query
        name: q
        schema: { type: string }
        description: Free-text substring search across URL (not yet implemented)
      - in: query
        name: cursor
        schema: { type: string }
        description: Opaque pagination cursor (not yet implemented)
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
    get:
      tags: [urls]
      summary: The main results grid — list URLs, optionally filtered by finding
      description: |
        The hot path. Returns a page of URL rows, suitable for rendering
        the SF-style tabular grid. Pass `filter=<filter_key>` to narrow
        to only URLs whose findings include that key — e.g.
        `filter=images_missing_alt_text` returns every URL that had at
        least one `<img>` missing usable alt text.

        **Implemented filter keys (Batches 1–5):** see the
        `/v1/catalog/tabs` catalog. Any filter key is accepted, but
        un-implemented keys will return an empty `data` array.

        **Batch 4 usage examples** (validated against the local fixture
        site `http://localhost:8181/` with 172 crawled URLs):
          - `filter=hreflang_missing_xdefault` — returns pages that have
            hreflang tags but no `x-default` entry.
          - `filter=hreflang_not_using_canonical` — hreflang set AND the
            canonical `<link>` points to a different URL than the page
            itself (Google recommends only placing hreflang on the
            canonical version).
          - `filter=url_ga_tracking_parameters` — URLs whose query string
            carries `utm_*`, `gclid`, `fbclid`, or `mc_cid`.
          - `filter=url_internal_search_url` — URLs that look like
            internal-site-search results (path contains `/search`/`/find`
            or query has `q=`/`s=`/`search=`/`query=`/`keyword=`).
          - `filter=content_readability_very_difficult` — body prose with
            a Flesch–Kincaid grade level ≥ 16.0.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UrlGridResponse" }
              examples:
                boltrack_unfiltered:
                  summary: First page of boltrack.in URLs (no filter)
                  value:
                    data:
                      - id: 019d99c6-88f0-7253-b6fc-92ad510fe576
                        url: https://boltrack.in/
                        status_code: 200
                        content_type: html
                        is_internal: true
                        depth: 0
                        title: Suspended Platform Rental Ahmedabad - Boltrack Engineers
                        title_length: 56
                        h1_first: WORK AT ANYHEIGHT WITHCONFIDENCE
                        h1_count: 1
                        word_count: 1681
                        response_time_ms: 707
                        content_length: 0
                        crawled_at: 2026-04-17T04:50:18.480459Z
                    next_cursor: null
                images_missing_alt:
                  summary: filter=images_missing_alt_text
                  value:
                    data:
                      - id: 019d99c6-88f0-7253-b6fc-92ad510fe576
                        url: https://boltrack.in/
                        status_code: 200
                        content_type: html
                        is_internal: true
                        depth: 0
                        title: Suspended Platform Rental Ahmedabad - Boltrack Engineers
                        h1_count: 1
                    next_cursor: null
                hreflang_not_using_canonical:
                  summary: filter=hreflang_not_using_canonical (fixture — 1 row)
                  value:
                    data:
                      - id: 019d99ec-d055-7cc1-945e-6b112ae50633
                        url: http://localhost:8181/hreflang-not-canonical.html
                        status_code: 200
                        content_type: html
                        is_internal: true
                        depth: 1
                        title: Hreflang page not using canonical
