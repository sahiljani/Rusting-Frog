                      length_pixels:    { type: integer }
                      max_chars:        { type: integer }
                      max_pixels:       { type: integer }
                      remaining_chars:  { type: integer }
                      remaining_pixels: { type: integer }
                      truncated:        { type: boolean }
                  description:
                    type: object
                    properties:
                      value:                 { type: string, nullable: true }
                      length_chars:          { type: integer }
                      length_pixels_approx:  { type: integer }
                      max_chars:             { type: integer }
                      max_pixels:            { type: integer }
                      remaining_chars:       { type: integer }
                      remaining_pixels:      { type: integer }
                      truncated:             { type: boolean }
