  /v1/crawls/{crawl_id}/urls/{url_id}/headers:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
      - { $ref: "#/components/parameters/UrlId" }
    get:
      tags: [urls]
      summary: HTTP response headers for a single URL
      description: |
        Feeds SF's per-URL **HTTP Headers** detail tab. Returns every
        response header captured during the crawl, preserved in the
        original order the server sent them (headers are sometimes
        order-significant — e.g. multiple `Set-Cookie` lines). Header
        names are lowercased because the crawler normalises them at
        ingest; values are verbatim. `final_url` reflects the URL
        *after* any 3xx redirect chain — compare with the `url`
        parameter to detect redirects.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url, header_count, headers]
                properties:
                  url:          { type: string, format: uri }
                  final_url:    { type: string, format: uri, nullable: true }
                  status_code:  { type: integer, nullable: true }
                  header_count: { type: integer }
                  headers:
                    type: array
                    items:
                      type: object
                      required: [name, value]
                      properties:
                        name:  { type: string }
                        value: { type: string }
              examples:
                example_com:
                  summary: example.com — 10 headers, no redirect
                  value:
                    url: "https://example.com/"
                    final_url: "https://example.com/"
                    status_code: 200
                    header_count: 10
                    headers:
                      - { name: "date",              value: "Fri, 17 Apr 2026 13:27:10 GMT" }
                      - { name: "content-type",      value: "text/html" }
                      - { name: "transfer-encoding", value: "chunked" }
                      - { name: "connection",        value: "keep-alive" }
                      - { name: "server",            value: "cloudflare" }
                      - { name: "last-modified",     value: "Tue, 14 Apr 2026 05:44:44 GMT" }
                      - { name: "allow",             value: "GET, HEAD, OPTIONS" }
                      - { name: "cache-control",     value: "max-age=1914" }
                      - { name: "vary",              value: "Accept-Encoding" }
                      - { name: "etag",              value: "\"84238dfc8092e5d9c0dac8ef93371a07:1749285264.428683\"" }

  /v1/crawls/{crawl_id}/urls/{url_id}/cookies:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
      - { $ref: "#/components/parameters/UrlId" }
    get:
      tags: [urls]
      summary: Parsed cookies for a single URL
      description: |
        Feeds SF's per-URL **Cookies** detail tab. Filters the URL's
        response headers down to `Set-Cookie` entries and parses each
        into its attribute breakdown (Domain / Path / Expires / Max-Age
        / Secure / HttpOnly / SameSite). Matching is case-insensitive.
        The `raw` field preserves the full `Set-Cookie` line for
        audit/debug. Returns `cookies: []` when the response set none.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url, count, cookies]
                properties:
                  url:    { type: string, format: uri }
                  count:  { type: integer }
                  cookies:
                    type: array
                    items:
                      type: object
                      required: [name, value, raw]
                      properties:
                        name:      { type: string }
                        value:     { type: string }
                        domain:    { type: string, nullable: true }
                        path:      { type: string, nullable: true }
                        expires:   { type: string, nullable: true, description: "Raw Expires= value (HTTP-date)" }
                        max_age:   { type: integer, nullable: true }
                        secure:    { type: boolean }
                        http_only: { type: boolean }
                        same_site: { type: string, nullable: true, enum: [Strict, Lax, None] }
                        raw:       { type: string, description: "Original Set-Cookie header value" }
              examples:
                github_root:
                  summary: github.com — 3 cookies with full attribute coverage
                  value:
                    url: "https://github.com/"
                    count: 3
                    cookies:
                      - name: "_gh_sess"
                        value: "iIKg…tQ%3D%3D"
                        domain: null
                        path: "/"
                        expires: null
                        max_age: null
                        secure: true
                        http_only: true
                        same_site: "Lax"
                        raw: "_gh_sess=iIKg…; path=/; HttpOnly; secure; SameSite=Lax"
                      - name: "_octo"
                        value: "GH1.1.227630100.1776432693"
                        domain: ".github.com"
                        path: "/"
                        expires: "Sat, 17 Apr 2027 13:31:33 GMT"
                        max_age: null
                        secure: true
                        http_only: false
                        same_site: "Lax"
                        raw: "_octo=GH1.1.227630100.1776432693; expires=Sat, 17 Apr 2027 13:31:33 GMT; domain=.github.com; path=/; secure; SameSite=Lax"
                      - name: "logged_in"
                        value: "no"
                        domain: ".github.com"
                        path: "/"
                        expires: "Sat, 17 Apr 2027 13:31:33 GMT"
                        max_age: null
                        secure: true
                        http_only: true
                        same_site: "Lax"
                        raw: "logged_in=no; expires=Sat, 17 Apr 2027 13:31:33 GMT; domain=.github.com; path=/; HttpOnly; secure; SameSite=Lax"
                example_com_empty:
                  summary: example.com — no cookies set
                  value:
                    url: "https://example.com/"
                    count: 0
                    cookies: []

  /v1/crawls/{crawl_id}/urls/{url_id}/source:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
      - { $ref: "#/components/parameters/UrlId" }
    get:
      tags: [urls]
      summary: Raw HTML body — SF View Source tab
      description: |
        Returns the raw HTML body captured at crawl time verbatim.
        `content_hash` is the hex-encoded SHA-256 of a normalised form
        of the body (lowercased, comments stripped, whitespace collapsed)
        — the same value the **Duplicate Details** tab uses to match
        exact duplicates. For non-HTML responses (images, binary, empty
        redirect bodies) `html` and `content_hash` are null.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url, content_type, html_length]
                properties:
                  url:            { type: string, format: uri }
                  content_type:   { type: string, nullable: true }
                  content_length: { type: integer, nullable: true }
                  html_length:    { type: integer }
                  content_hash:   { type: string, nullable: true, description: "Hex-encoded SHA-256 of normalised body" }
                  html:           { type: string, nullable: true }

  /v1/crawls/{crawl_id}/urls/{url_id}/duplicates:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
      - { $ref: "#/components/parameters/UrlId" }
    get:
      tags: [urls]
      summary: Exact-duplicate pages — SF Duplicate Details tab
      description: |
        Returns every other URL in the same crawl whose normalised
        content hash matches this URL's. `match_type` is always `"exact"`
        in this pass — near-duplicate (MinHash) pairing is a post-crawl
        analysis step and is deferred to Batch D.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url, match_type, count, duplicates]
                properties:
                  url:           { type: string, format: uri }
                  content_hash:  { type: string, nullable: true }
                  match_type:    { type: string, enum: [exact] }
                  count:         { type: integer }
                  duplicates:
                    type: array
                    items:
                      type: object
                      properties:
                        url_id:     { type: string, format: uuid }
                        url:        { type: string, format: uri }
                        similarity: { type: number, description: "1.0 for exact matches" }

  /v1/crawls/{crawl_id}/urls/{url_id}/structured-data:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
      - { $ref: "#/components/parameters/UrlId" }
    get:
      tags: [urls]
      summary: Structured data items — SF Structured Data tab
      description: |
        Returns every structured-data block extracted from the page
        during parsing. Each item is `{ type, data }` — `type` is
        `"JSON-LD"` (Microdata/RDFa remain empty until a parser is
        wired). `counts_by_type` is a small rollup keyed by type so
        the UI can render badges without re-scanning the array.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [url, count, items]
                properties:
                  url:             { type: string, format: uri }
                  count:           { type: integer }
                  counts_by_type:
                    type: object
                    additionalProperties: { type: integer }
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        type: { type: string, enum: ["JSON-LD", "Microdata", "RDFa"] }
                        data: { }
              examples:
                github_home:
                  summary: github.com — 2 JSON-LD blocks (WebSite + Organization)
                  value:
                    url: "https://github.com/"
                    count: 2
                    counts_by_type: { "JSON-LD": 2 }
                    items:
                      - type: "JSON-LD"
                        data:
                          "@context": "https://schema.org"
                          "@type": "WebSite"
                          "url": "https://github.com/"
                      - type: "JSON-LD"
                        data:
                          "@context": "https://schema.org"
                          "@type": "Organization"
                          "name": "GitHub"

  /v1/crawls/{crawl_id}/reports:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
    get:
      tags: [reports]
      summary: Catalog of available reports for this crawl
      description: |
        Returns the full list of report keys the API can generate for
        this crawl — groups match SF's top-menu Reports submenu
        (Redirects, Canonicals, Pagination, Hreflang, Security, SERP,
        Links, Structured Data, JavaScript, PageSpeed, Mobile,
        Accessibility, HTTP Headers, Cookies). As of 0.11.0, the
        `http_headers_all` and `cookies_all` reports are wired to real
        crawler-captured header data; a small number of reports (redirect
        chains, segment rollups) remain stubs and return `rows: []` with
        a `notes` field until their upstream data is captured.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  reports:
                    type: array
                    items:
                      type: object
                      properties:
                        key:   { type: string }
                        title: { type: string }
                        group: { type: string }

  /v1/crawls/{crawl_id}/reports/{report_key}:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
      - in: path
        name: report_key
        required: true
        schema: { type: string }
        description: One of the keys from `/reports`.
      - in: query
        name: format
        schema: { type: string, enum: [json, csv], default: json }
      - in: query
        name: limit
        schema: { type: integer, default: 10000 }
    get:
      tags: [reports]
      summary: Run a report and return rows (JSON or CSV)
      description: |
        JSON response envelope:
        ```
        { key, title, group, count, columns[], rows[], notes? }
        ```
        CSV response: `Content-Type: text/csv; charset=utf-8`,
        `Content-Disposition: attachment; filename="<report_key>.csv"`.
        Columns are stable per report_key.
      responses:
        "200":
          description: OK
          content:
            application/json:
              examples:
                canonicals_non_indexable:
                  value:
                    key: "canonicals_non_indexable"
                    title: "Canonicals: Non-Indexable"
                    group: "Canonicals"
                    count: 2
                    columns: ["source_url", "canonical_url", "dest_status_code", "dest_meta_robots"]
                    rows:
                      - source_url: "https://example.com/a"
                        canonical_url: "https://example.com/x"
                        dest_status_code: 404
                        dest_meta_robots: null
                site_structure:
                  value:
                    key: "site_structure"
                    title: "Site Structure"
                    group: "Overview"
                    count: 5
                    columns: ["depth", "urls"]
                    rows:
                      - { depth: 0, urls: 1 }
                      - { depth: 1, urls: 42 }
                      - { depth: 2, urls: 103 }
                      - { depth: 3, urls: 48 }
                      - { depth: 4, urls: 14 }
                http_headers_all:
                  summary: http_headers_all — one row per (URL, header)
                  value:
                    key: "http_headers_all"
                    title: "HTTP Headers: All"
                    group: "HTTP Headers"
                    count: 3
                    columns: ["url", "name", "value"]
                    rows:
                      - { url: "https://example.com/", name: "content-type",      value: "text/html" }
                      - { url: "https://example.com/", name: "server",            value: "cloudflare" }
                      - { url: "https://example.com/", name: "cache-control",     value: "max-age=1914" }
                cookies_all:
                  summary: cookies_all — parsed Set-Cookie attributes per row
                  value:
                    key: "cookies_all"
                    title: "Cookies: All"
                    group: "Cookies"
                    count: 2
                    columns: ["url", "name", "value", "domain", "path", "expires", "secure", "http_only", "same_site"]
                    rows:
                      - url: "https://github.com/"
                        name: "_octo"
                        value: "GH1.1.227630100.1776432693"
                        domain: ".github.com"
                        path: "/"
                        expires: "Sat, 17 Apr 2027 13:31:33 GMT"
                        secure: true
                        http_only: false
                        same_site: "Lax"
                      - url: "https://github.com/"
                        name: "logged_in"
                        value: "no"
                        domain: ".github.com"
                        path: "/"
                        expires: "Sat, 17 Apr 2027 13:31:33 GMT"
                        secure: true
                        http_only: true
                        same_site: "Lax"
            text/csv:
              schema: { type: string }
              examples:
                redirects_all:
                  value: |
                    url,status_code,redirect_url
                    https://example.com/old,301,https://example.com/new
        "404":
          description: Unknown report_key (or crawl not owned by tenant).
          content:
            application/problem+json:
              schema: { $ref: "#/components/schemas/Problem" }

  /v1/crawls/{crawl_id}/issues:
    parameters:
      - { $ref: "#/components/parameters/CrawlIdAsCrawl" }
    get:
      tags: [reports]
      summary: Issues tab — SF-style findings rollup with description + how-to-fix
      description: |
        Feeds Screaming Frog's right-hand "Issues" panel. Groups
        findings by filter_key, classifies each row as Issue /
        Warning / Opportunity, and attaches hand-curated
        description + how-to-fix copy from the port of SF's
        editorial strings. Sorted by type severity then URL count
        descending.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [summary, total_urls, items]
                properties:
                  summary:
                    type: object
                    properties:
                      issues:        { type: integer }
                      warnings:      { type: integer }
                      opportunities: { type: integer }
                      info:          { type: integer }
                      total:         { type: integer, description: issues+warnings+opportunities }
                  total_urls: { type: integer }
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        filter_key:       { type: string }
                        issue_name:       { type: string }
                        issue_type:       { type: string, enum: [Issue, Warning, Opportunity] }
                        priority:         { type: string, nullable: true, enum: [High, Medium, Low] }
                        urls:             { type: integer }
                        percent_of_total: { type: number }
                        description:      { type: string, nullable: true }
                        how_to_fix:       { type: string, nullable: true }
              examples:
                boltrack:
                  summary: live crawl, 208 URLs
                  value:
                    summary: { issues: 41, warnings: 6, opportunities: 4, info: 50, total: 51 }
                    total_urls: 208
                    items:
                      - filter_key: "meta_keywords_missing"
                        issue_name: "Meta Keywords: Missing"
                        issue_type: "Issue"
                        priority: "Medium"
                        urls: 106
                        percent_of_total: 51.0
                        description: "Pages without a <meta name=\"keywords\"> tag. Note: Google has ignored meta keywords since 2009 — this filter is surfaced only for completeness and legacy tooling compatibility."
                        how_to_fix: "No action required for Google. If you target Yandex or other engines that still honour the tag, add <meta name=\"keywords\" content=\"…\">."
                      - filter_key: "hreflang_missing"
                        issue_name: "Hreflang: Missing"
                        issue_type: "Issue"
                        priority: "Medium"
                        urls: 105
                        percent_of_total: 50.5
                        description: "Pages in an internationalised site that have no hreflang annotation. Without hreflang, Google may serve the wrong language to users."
                        how_to_fix: "Add hreflang annotations pointing at every language/region variant, including a self-reference and an x-default fallback."

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Short-lived JWT issued by Laravel; `tenant_id`, `user_id`, `scopes` claims required.

  parameters:
    ProjectId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    CrawlId:
      in: path
      name: id
      required: true
      schema: { type: string, format: uuid }
    CrawlIdAsCrawl:
      in: path
      name: crawl_id
      required: true
      schema: { type: string, format: uuid }
    UrlId:
      in: path
      name: url_id
      required: true
      schema: { type: string, format: uuid }

  responses:
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    NotFound:
      description: Resource not found in this tenant
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }
    ValidationError:
      description: Request body failed validation
      content:
        application/problem+json:
          schema: { $ref: "#/components/schemas/Problem" }

  schemas:
    Problem:
      type: object
      properties:
        type: { type: string, format: uri }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
      required: [title, status]

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        seed_url: { type: string, format: uri }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
      required: [id, name, seed_url, created_at, updated_at]

    CreateProjectRequest:
      type: object
      properties:
        name: { type: string, example: "My Site" }
        seed_url: { type: string, format: uri, example: "https://example.com/" }
      required: [name, seed_url]

    CrawlSummary:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [queued, running, paused, completed, failed] }
        urls_discovered: { type: integer }
        urls_crawled: { type: integer }
        started_at: { type: string, format: date-time, nullable: true }
        completed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
      required: [id, status, urls_discovered, urls_crawled, created_at]

    CrawlDetail:
      allOf:
        - $ref: "#/components/schemas/CrawlSummary"
        - type: object
          properties:
            project_id: { type: string, format: uuid }
            seed_urls:
              type: array
              items: { type: string, format: uri }

    CrawlStartResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string }
        message: { type: string }
      required: [id, status, message]

    TabCatalog:
      type: object
      properties:
        key: { type: string }
        display_name: { type: string }
        i18n_key: { type: string }
        has_dynamic_filters: { type: boolean }
        filters:
          type: array
          items: { $ref: "#/components/schemas/FilterCatalog" }
      required: [key, display_name, filters]

    FilterCatalog:
      type: object
      properties:
        key: { type: string, example: h1_missing }
        display_name: { type: string, example: Missing }
        severity:
          type: string
          enum: [Issue, PotentialIssue, Opportunity, Normal]
        filter_type:
          type: string
          enum: [Normal, Issue, PotentialIssue, Opportunity, Highlight, NotSet, PostCrawlAnalysis]
        has_watermark: { type: boolean }
      required: [key, display_name]

    UrlGridResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: "#/components/schemas/UrlRow" }
        next_cursor:
          type: string
          nullable: true
      required: [data]

    UrlRow:
      type: object
      properties:
        id: { type: string, format: uuid }
        url: { type: string, format: uri }
        status_code: { type: integer, nullable: true }
        content_type: { type: string }
        is_internal: { type: boolean }
        depth: { type: integer }
        title: { type: string, nullable: true }
        title_length: { type: integer, nullable: true }
        h1_first: { type: string, nullable: true }
        h1_count: { type: integer }
        word_count: { type: integer, nullable: true }
        response_time_ms: { type: integer, nullable: true }
        content_length: { type: integer, nullable: true }
        crawled_at: { type: string, format: date-time, nullable: true }
      required: [id, url]

    UrlDetail:
      allOf:
        - $ref: "#/components/schemas/UrlRow"
        - type: object
          properties:
            title_pixel_width: { type: integer, nullable: true }
            meta_description: { type: string, nullable: true }
            meta_description_length: { type: integer, nullable: true }
            h2_first: { type: string, nullable: true }
            h2_count: { type: integer }
            redirect_url: { type: string, nullable: true }
            canonical_url: { type: string, nullable: true }
            meta_robots: { type: string, nullable: true }
            findings:
              type: array
              items: { type: string }
              description: Filter keys that fired on this URL.

    Inlink:
      type: object
      properties:
        source_url_id: { type: string, format: uuid }
        source_url: { type: string, format: uri }
        anchor_text: { type: string, nullable: true }
        link_type: { type: string }

    Outlink:
      type: object
      properties:
        target_url_id: { type: string, format: uuid }
        target_url: { type: string, format: uri }
        anchor_text: { type: string, nullable: true }
        link_type: { type: string }
