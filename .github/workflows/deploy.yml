name: deploy

# CD runs only on green main. CI is defined separately; make it a
# required status check in branch protection so this workflow never
# triggers on a red commit.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Queue deploys — never cancel a running rollout.
concurrency:
  group: deploy-main
  cancel-in-progress: false

# OIDC-only: no long-lived AWS keys in GitHub Secrets.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  build-push:
    name: build + push to ECR
    runs-on: ubuntu-latest
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
      image_tag: ${{ steps.image.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Assume deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image coordinates
        id: image
        run: |
          TAG="${GITHUB_SHA}"
          URI="${{ steps.ecr.outputs.registry }}/${ECR_REPOSITORY}:${TAG}"
          echo "uri=${URI}"      >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"      >> "$GITHUB_OUTPUT"
          echo "registry=${{ steps.ecr.outputs.registry }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.uri }}
            ${{ steps.ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: roll EC2 via SSM
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - name: Assume deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: gha-${{ github.run_id }}

      # The EC2 host already has /opt/sf-clone/deploy.sh from provisioning.
      # We just invoke it with the new image tag. Keeping the real logic on
      # the host (not in this YAML) means deploy behaviour is versioned
      # alongside the repo and not hidden inside CI.
      - name: Send deploy command
        id: ssm
        run: |
          set -euo pipefail
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name AWS-RunShellScript \
            --comment "deploy ${GITHUB_SHA::7}" \
            --parameters commands='["/opt/sf-clone/deploy.sh '"${{ needs.build-push.outputs.image_tag }}"'"]' \
            --query Command.CommandId --output text)
          echo "command_id=${CMD_ID}" >> "$GITHUB_OUTPUT"
          echo "::notice::SSM command ${CMD_ID} sent"

      - name: Wait for deploy to finish
        run: |
          set -euo pipefail
          # Default waiter is 100 attempts * 5s = ~8 minutes. Plenty for a pull + restart.
          aws ssm wait command-executed \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

      - name: Fetch deploy output
        if: always()
        run: |
          aws ssm get-command-invocation \
            --command-id "${{ steps.ssm.outputs.command_id }}" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query '{status:Status,stdout:StandardOutputContent,stderr:StandardErrorContent}' \
            --output json
