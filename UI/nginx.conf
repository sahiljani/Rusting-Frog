server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — React Router paths (/projects/123 etc.) resolve to
    # index.html so the client-side router can pick them up.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # All API traffic goes through this same host on port 80. Keeps the
    # browser's same-origin model happy and hides the Rust service from
    # the public internet — only port 80 is exposed on the EC2.
    location /v1/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade for /v1/crawls/:id/live
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Long crawls + slow exports need generous timeouts.
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;
    }

    # Cheap liveness probe — no /health on the Rust side yet, so nginx
    # gives us one for free. ALB / uptime monitors can hit this.
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
