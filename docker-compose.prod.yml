# Production compose file. Unlike docker-compose.yml this never builds —
# api/worker/migrations all pull the same prebuilt image from ECR. The
# tag is controlled by the deploy workflow via ${IMAGE_TAG}, so a
# rollback is: IMAGE_TAG=<old-sha> docker compose -f docker-compose.prod.yml up -d
#
# Bring up manually on a fresh host:
#   cd /opt/sf-clone
#   $(aws ecr get-login-password --region $AWS_REGION | \
#       docker login --username AWS --password-stdin $IMAGE_REGISTRY)
#   IMAGE_TAG=latest docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in /opt/sf-clone/.env}
      POSTGRES_DB: ${POSTGRES_DB:-sf_clone}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sf} -d ${POSTGRES_DB:-sf_clone}"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "3"}

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "3"}

  migrations:
    image: ${IMAGE_REGISTRY}/${IMAGE_REPO}:${IMAGE_TAG:-latest}
    command: ["sf-migrations"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sf_clone}
      RUST_LOG: ${RUST_LOG:-info}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  api:
    image: ${IMAGE_REGISTRY}/${IMAGE_REPO}:${IMAGE_TAG:-latest}
    command: ["sf-api"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sf_clone}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in /opt/sf-clone/.env}
      LISTEN_ADDR: 0.0.0.0:3000
      RUST_LOG: ${RUST_LOG:-info}
      # Exposes /v1/dev/token which mints a signed JWT without a login.
      # Leave blank/unset on real prod — set to 1 on the shared staging
      # host so the React UI can auto-auth while Laravel proxy isn't wired.
      SF_DEV_MODE: ${SF_DEV_MODE:-}
      SF_DEBUG_LOG_DIR: /var/log/sf-debug
    # No host-level ports mapping: traffic enters via the nginx `ui`
    # service which proxies /v1/* to api:3000 on the internal network.
    # Re-expose this only if Laravel needs direct access from outside.
    expose:
      - "3000"
    volumes:
      - debug-logs:/var/log/sf-debug:ro
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "3"}

  ui:
    # Nginx + pre-built React SPA. Also reverse-proxies /v1/* → api:3000
    # so the browser only ever sees port 80 on this host.
    image: ${IMAGE_REGISTRY}/${IMAGE_REPO_UI:-sf-clone-ui}:${IMAGE_TAG:-latest}
    ports:
      - "${UI_PORT:-80}:80"
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "3"}

  worker:
    image: ${IMAGE_REGISTRY}/${IMAGE_REPO}:${IMAGE_TAG:-latest}
    command: ["sf-crawl-worker"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-sf}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sf_clone}
      REDIS_URL: redis://redis:6379
      RUST_LOG: ${RUST_LOG:-info}
      SF_DEBUG_LOG_DIR: /var/log/sf-debug
    volumes:
      - debug-logs:/var/log/sf-debug
    depends_on:
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: json-file
      options: {max-size: "20m", max-file: "3"}

volumes:
  pgdata:
  redisdata:
  debug-logs:
